<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>あなたのAIタイプ診断｜10問でわかる</title>
<meta name="description" content="10問でわかる、あなたのAIタイプ診断。キャラ＆ステータスで結果が出る。スマホでもPCでも遊べる。" />
<style>
  :root{
    --bg:#0a0812;
    --bg-2:#120f1d;
    --card:#1a1630;
    --card-2:#221d3a;
    --txt:#f3f0fb;
    --muted:#a99fcb;
    --line:rgba(255,255,255,.08);
    --accent:#8b7cf6;
    --accent-2:#22d3ee;
    --grad:linear-gradient(135deg,#8b7cf6,#22d3ee);
    --tc:#8b7cf6;
    --tc2:#22d3ee;
    --radius:20px;
    --shadow:0 30px 70px -32px rgba(0,0,0,.85);
    --font:system-ui,-apple-system,"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Meiryo",sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:var(--font);color:var(--txt);
    background:
      radial-gradient(1000px 700px at 12% -8%, rgba(139,124,246,.28), transparent 60%),
      radial-gradient(1000px 700px at 105% 8%, rgba(34,211,238,.18), transparent 55%),
      var(--bg);
    min-height:100vh;min-height:100dvh;line-height:1.7;-webkit-font-smoothing:antialiased;
    padding:env(safe-area-inset-top) 16px calc(env(safe-area-inset-bottom) + 28px);
    display:flex;flex-direction:column;align-items:center;
  }
  .stage{width:100%;max-width:560px;margin:auto;padding:26px 0}
  .panel{
    position:relative;border-radius:var(--radius);box-shadow:var(--shadow);
    background:linear-gradient(180deg,rgba(255,255,255,.05),rgba(255,255,255,.015));
    border:1px solid var(--line);backdrop-filter:blur(14px);
    padding:30px 24px;overflow:hidden;
    animation:rise .55s cubic-bezier(.2,.7,.2,1) both;
  }
  .panel::before{content:"";position:absolute;inset:0;border-radius:inherit;padding:1px;
    background:linear-gradient(140deg,rgba(255,255,255,.25),transparent 40%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:.5}
  @keyframes rise{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
  .hide{display:none!important}

  /* ---- Intro ---- */
  .badge{display:inline-flex;align-items:center;gap:8px;font-size:.78rem;letter-spacing:.13em;font-weight:700;
    color:#d6c9ff;background:rgba(139,124,246,.16);border:1px solid rgba(139,124,246,.32);
    padding:7px 15px;border-radius:999px;margin-bottom:18px}
  .badge .dot{width:7px;height:7px;border-radius:50%;background:var(--grad);box-shadow:0 0 10px var(--accent)}
  h1.title{font-size:clamp(1.9rem,7.5vw,2.6rem);font-weight:900;line-height:1.22;letter-spacing:.01em}
  h1.title .g{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  .lead{color:var(--muted);margin:16px 0 26px;font-size:1rem}
  .meta-row{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:28px}
  .chip{font-size:.82rem;color:var(--muted);background:rgba(255,255,255,.05);border:1px solid var(--line);padding:8px 13px;border-radius:11px}
  .chip b{color:var(--txt)}

  .btn{width:100%;border:none;cursor:pointer;font-family:var(--font);font-weight:800;font-size:1.08rem;
    color:#0a0812;background:var(--grad);padding:17px 20px;border-radius:14px;letter-spacing:.02em;
    transition:transform .15s ease,filter .2s ease,box-shadow .2s ease;
    box-shadow:0 14px 34px -12px rgba(139,124,246,.75);-webkit-tap-highlight-color:transparent}
  .btn:hover{filter:brightness(1.07)}
  .btn:active{transform:scale(.985)}
  .btn.secondary{color:var(--txt);background:rgba(255,255,255,.06);border:1px solid var(--line);box-shadow:none;font-weight:600;font-size:1rem}
  .btn.secondary:hover{background:rgba(255,255,255,.1)}
  .btn.accentline{background:rgba(255,255,255,.05);border:1px solid var(--tc);color:#fff;box-shadow:0 12px 30px -16px var(--tc)}

  /* ---- Quiz ---- */
  .qhead{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .qcount{font-size:.85rem;color:var(--muted);font-weight:700;letter-spacing:.04em}
  .qcount b{color:#d6c9ff;font-size:1.05rem}
  .bar{height:8px;background:rgba(255,255,255,.07);border-radius:999px;overflow:hidden;margin-bottom:26px}
  .bar > i{display:block;height:100%;width:0;border-radius:999px;background:var(--grad);transition:width .45s cubic-bezier(.3,.8,.3,1);box-shadow:0 0 12px rgba(139,124,246,.6)}
  .qtext{font-size:clamp(1.18rem,4.8vw,1.5rem);font-weight:800;line-height:1.5;margin-bottom:22px}
  .opts{display:flex;flex-direction:column;gap:11px}
  .opt{text-align:left;cursor:pointer;font-family:var(--font);font-size:1rem;color:var(--txt);font-weight:500;
    background:rgba(255,255,255,.045);border:1.5px solid var(--line);padding:15px 16px;border-radius:14px;
    display:flex;align-items:center;gap:13px;transition:transform .12s ease,border-color .2s ease,background .2s ease;-webkit-tap-highlight-color:transparent}
  .opt:hover{border-color:rgba(139,124,246,.6);background:rgba(139,124,246,.1)}
  .opt:active{transform:scale(.99)}
  .opt .k{flex:0 0 auto;width:28px;height:28px;border-radius:9px;display:grid;place-items:center;font-size:.82rem;font-weight:800;
    color:#d6c9ff;background:rgba(139,124,246,.18);border:1px solid rgba(139,124,246,.32)}
  .opt.sel{border-color:transparent;background:var(--grad);color:#0a0812;font-weight:800}
  .opt.sel .k{background:rgba(10,8,18,.18);color:#0a0812;border-color:transparent}
  .back{margin-top:18px;text-align:center}
  .back button{background:none;border:none;color:var(--muted);font-family:var(--font);font-size:.9rem;cursor:pointer;padding:6px}
  .back button:hover{color:var(--txt)}

  /* ---- Result : character sheet ---- */
  #result{padding:26px 20px 30px}
  .sheet-top{text-align:center;position:relative}
  .avatar{width:240px;height:240px;margin:0 auto -4px;position:relative}
  .avatar .aura{position:absolute;inset:-6%;border-radius:50%;filter:blur(2px)}
  .avatar .fx{position:absolute;inset:0;width:100%;height:100%;overflow:visible}
  .avatar .fx .orbit{transform-origin:130px 130px;animation:spin 16s linear infinite}
  .avatar .fx .pt{transform-origin:center;animation:tw 2.4s ease-in-out infinite}
  .avatar .fx .pt:nth-child(odd){animation-delay:.9s}
  .avatar .char{position:absolute;inset:0;animation:float 4s ease-in-out infinite}
  .avatar .char svg{width:100%;height:100%;overflow:visible;display:block}
  @keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes tw{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
  .compat .ce{display:block;width:60px;height:60px;margin:2px auto 4px}
  .compat .ce svg{width:100%;height:100%;display:block}
  .stat.top .sn{color:#fff}
  .stat.top .sn::after{content:"TOP";font-size:.6rem;font-weight:800;letter-spacing:.06em;color:var(--tc);background:rgba(255,255,255,.06);border:1px solid var(--line);padding:1px 5px;border-radius:6px;margin-left:6px;vertical-align:1px}
  .rarity{font-size:1.15rem;letter-spacing:.18em;margin-top:2px}
  .rarity .on{color:var(--tc);text-shadow:0 0 12px var(--tc)}
  .rarity .off{color:rgba(255,255,255,.18)}
  .rkicker{font-size:.76rem;letter-spacing:.34em;color:var(--muted);font-weight:800;margin-top:10px}
  .rname{font-size:clamp(1.7rem,7vw,2.3rem);font-weight:900;margin:4px 0 4px;
    background:linear-gradient(120deg,#fff,var(--tc));-webkit-background-clip:text;background-clip:text;color:transparent}
  .rcatch{font-weight:700;color:var(--tc);margin-bottom:20px;font-size:1rem}

  .stats{display:flex;flex-direction:column;gap:13px;margin:4px 0 22px;
    background:rgba(0,0,0,.22);border:1px solid var(--line);border-radius:16px;padding:18px 16px}
  .stat{display:grid;grid-template-columns:84px 1fr 38px;align-items:center;gap:11px}
  .stat .sn{font-size:.84rem;color:var(--muted);font-weight:700;letter-spacing:.02em}
  .stat .sbar{height:12px;background:rgba(255,255,255,.08);border-radius:999px;overflow:hidden}
  .stat .sbar > i{display:block;height:100%;width:0;border-radius:999px;
    background:linear-gradient(90deg,var(--tc),var(--tc2));transition:width 1.1s cubic-bezier(.2,.8,.2,1);box-shadow:0 0 10px var(--tc)}
  .stat .sv{font-size:.95rem;font-weight:800;color:#fff;text-align:right;font-variant-numeric:tabular-nums}

  .panels{display:flex;flex-direction:column;gap:11px}
  .ipanel{background:rgba(255,255,255,.04);border:1px solid var(--line);border-radius:14px;padding:14px 16px}
  .ipanel .lbl{display:inline-block;font-size:.68rem;letter-spacing:.16em;font-weight:800;color:var(--tc);
    background:rgba(255,255,255,.05);border:1px solid var(--line);padding:3px 9px;border-radius:7px;margin-bottom:8px}
  .ipanel p{font-size:.95rem;color:#e8e2f7}
  .compat{display:flex;gap:12px}
  .compat .half{flex:1;text-align:center}
  .compat .ce{font-size:1.7rem;display:block;line-height:1.2}
  .compat .cn{font-size:.84rem;color:#e8e2f7;font-weight:700}

  .r-actions{display:flex;flex-direction:column;gap:11px;margin-top:22px}
  .copied{text-align:center;color:var(--accent-2);font-size:.85rem;font-weight:700;height:18px;margin-top:10px;opacity:0;transition:opacity .3s}
  .copied.show{opacity:1}
  .foot{text-align:center;color:var(--muted);font-size:.78rem;margin-top:22px}
  .foot b{color:#d6c9ff}

  /* ---- 画像保存モーダル ---- */
  .modal{position:fixed;inset:0;z-index:60;background:rgba(4,3,9,.88);backdrop-filter:blur(6px);
    display:none;flex-direction:column;align-items:center;justify-content:center;padding:22px;gap:14px}
  .modal.open{display:flex;animation:rise .3s ease both}
  .modal img{max-width:100%;max-height:66vh;border-radius:18px;box-shadow:var(--shadow)}
  .modal .hint{color:var(--muted);font-size:.88rem;text-align:center;line-height:1.6}
  .modal .mclose{max-width:280px}

  @media(min-width:600px){.panel{padding:40px 38px}#result{padding:36px 34px}}
</style>
</head>
<body>
<main class="stage">

  <!-- INTRO -->
  <section id="intro" class="panel">
    <span class="badge"><span class="dot"></span>10問・約1分でわかる</span>
    <h1 class="title">あなたの<span class="g">AIタイプ</span><br>診断</h1>
    <p class="lead">直感で10問に答えるだけ。あなただけの<b style="color:#fff">AI相棒キャラ</b>と、5つのステータスで結果が出る。スマホでもPCでも遊べる。</p>
    <div class="meta-row">
      <span class="chip"><b>全10問</b></span>
      <span class="chip"><b>6キャラ</b>判定</span>
      <span class="chip">所要<b>1分</b></span>
      <span class="chip">結果を<b>画像で保存</b></span>
    </div>
    <button class="btn" id="startBtn">診断をはじめる</button>
  </section>

  <!-- QUIZ -->
  <section id="quiz" class="panel hide">
    <div class="qhead">
      <span class="qcount">Q<b id="qNum">1</b> <span style="opacity:.5">/ 10</span></span>
      <span class="qcount" id="qPct">10%</span>
    </div>
    <div class="bar"><i id="barFill"></i></div>
    <p class="qtext" id="qText">質問</p>
    <div class="opts" id="opts"></div>
    <div class="back"><button id="backBtn">← 前の質問にもどる</button></div>
  </section>

  <!-- RESULT -->
  <section id="result" class="panel hide">
    <div class="sheet-top">
      <div class="avatar" id="avatar"></div>
      <div class="rarity" id="rRarity"></div>
      <div class="rkicker" id="rKicker">AI TYPE</div>
      <h2 class="rname" id="rTitle">タイプ</h2>
      <p class="rcatch" id="rCatch"></p>
    </div>

    <div class="stats" id="stats"></div>

    <div class="panels">
      <div class="ipanel"><span class="lbl">SKILL ／ 強み</span><p id="rStrong"></p></div>
      <div class="ipanel"><span class="lbl">NEXT QUEST ／ 次の一歩</span><p id="rNext"></p></div>
      <div class="ipanel compat">
        <div class="half"><span class="lbl">相性◎</span><span class="ce" id="rGoodEmoji">🤝</span><span class="cn" id="rGood"></span></div>
        <div class="half"><span class="lbl">相性△</span><span class="ce" id="rBadEmoji">💸</span><span class="cn" id="rBad"></span></div>
      </div>
    </div>

    <div class="r-actions">
      <button class="btn" id="saveImgBtn">結果を画像で保存</button>
      <button class="btn secondary" id="copyBtn">結果をテキストでコピー</button>
      <button class="btn secondary" id="retryBtn">もう一度診断する</button>
    </div>
    <div class="copied" id="copied">コピーしたよ。Threadsに貼ってね</div>
    <div class="foot">#あなたのAIタイプ診断　みんなの結果コメントで教えて</div>
  </section>

  <!-- 画像保存モーダル -->
  <div class="modal" id="imgModal">
    <img id="modalImg" alt="診断結果カード" />
    <p class="hint">保存できない時は画像を長押し →「写真に保存」<br>（PCは右クリック →「画像を保存」）</p>
    <button class="btn secondary mclose" id="modalClose">閉じる</button>
  </div>

</main>

<script src="_mascots.js"></script>
<script>
(function(){
  "use strict";

  // ===== 設問 =====
  var QUESTIONS = [
    { q:"AIを開いて、まず何する？", a:[
      {t:"今日あったことを雑談する", k:"partner"},
      {t:"やりたい作業をまるっと丸投げ", k:"eff"},
      {t:"新機能が出てないか探しに行く", k:"otaku"},
      {t:"指示文をじっくり組み立てる", k:"alch"} ]},
    { q:"AIへの課金、ぶっちゃけどう？", a:[
      {t:"気づけば複数課金してる", k:"otaku"},
      {t:"厳選して1つだけ課金", k:"eff"},
      {t:"課金してるけど正直持て余してる", k:"payer"},
      {t:"無料プランを限界まで使い倒す", k:"alch"} ]},
    { q:"AIで一番つくってみたいのは？", a:[
      {t:"おしゃれなサイトや画像", k:"creator"},
      {t:"自分専用のAI相棒", k:"partner"},
      {t:"どこでも効く神プロンプト", k:"alch"},
      {t:"課金の元が取れる仕組み", k:"payer"} ]},
    { q:"回答がイマイチな時の動きは？", a:[
      {t:"指示文を細かく直す", k:"alch"},
      {t:"別のAIにも同じこと聞く", k:"otaku"},
      {t:"もういいやと自分でやる", k:"payer"},
      {t:"『そうじゃなくて』と会話で詰める", k:"partner"} ]},
    { q:"友達にAIを勧めるなら一言？", a:[
      {t:"『まず触ってみ』って背中押す", k:"partner"},
      {t:"『作れるもの見せたるわ』", k:"creator"},
      {t:"『この機能ヤバいから見て』", k:"otaku"},
      {t:"『指示の出し方教えたるわ』", k:"alch"} ]},
    { q:"1日にAIへ溶かす時間は？", a:[
      {t:"数時間はガッツリ", k:"otaku"},
      {t:"必要な時だけサッと", k:"eff"},
      {t:"契約はしてるけど数えるほど", k:"payer"},
      {t:"作りたい物がある時に没頭", k:"creator"} ]},
    { q:"新しいAIツールが出た時は？", a:[
      {t:"名前は知ってるけど後回し", k:"payer"},
      {t:"自分の用途に合うかだけ確認", k:"eff"},
      {t:"プロンプトがどこまで効くか検証", k:"alch"},
      {t:"とりあえず全部試して比較", k:"otaku"} ]},
    { q:"AIとの距離感を一言で？", a:[
      {t:"話し相手・相棒", k:"partner"},
      {t:"優秀な部下・道具", k:"eff"},
      {t:"研究対象・推し", k:"otaku"},
      {t:"創作のパートナー", k:"creator"} ]},
    { q:"『AIすげぇ』と痺れる瞬間は？", a:[
      {t:"一発で完璧な成果物が出た時", k:"creator"},
      {t:"自分のことを分かってくれた時", k:"partner"},
      {t:"狙った指示がビタっと決まった時", k:"alch"},
      {t:"面倒な作業が一瞬で消えた時", k:"eff"} ]},
    { q:"ぶっちゃけ今のホンネは？", a:[
      {t:"もっと極めたい", k:"otaku"},
      {t:"もっと作りたい", k:"creator"},
      {t:"課金分はちゃんと使いこなしたい", k:"payer"},
      {t:"もっとラクしたい", k:"eff"} ]}
  ];

  // ===== タイプ定義 =====
  // stats: [探究力, 効率, 創造力, 対話力, コスパ感]
  var STAT_LABELS = ["探究力","効率","創造力","対話力","コスパ"];
  var TYPES = {
    otaku:{ key:"otaku", emoji:"🔬", title:"沼の探求者", kicker:"AI OTAKU", rarity:5,
      color:"#22d3ee", color2:"#6366f1",
      stats:[95,55,70,60,40],
      catch:"気づけば数時間。AIに恋してるタイプ。",
      strong:"情報感度と検証量が圧倒的。誰よりも早く『使える機能』を見抜ける。",
      next:"Claude CodeのHooksやSubagentsまで触ると沼がもう一段深くなる。",
      good:"alch", bad:"payer" },
    eff:{ key:"eff", emoji:"🏎️", title:"時短ハッカー", kicker:"EFFICIENCY", rarity:4,
      color:"#f59e0b", color2:"#ef4444",
      stats:[60,95,55,50,85],
      catch:"ムダな作業はAIに丸投げ。とにかく速い。",
      strong:"成果に直結する使い方が上手い。1時間の作業を5分に圧縮できる。",
      next:"よくやる作業をSkillsに登録すると、毎朝の議事録やメール下書きが一瞬で終わる。",
      good:"payer", bad:"otaku" },
    alch:{ key:"alch", emoji:"🧙", title:"プロンプト錬金術師", kicker:"ALCHEMIST", rarity:5,
      color:"#a78bfa", color2:"#ec4899",
      stats:[80,75,85,70,90],
      catch:"指示文ひとつでAIを別物にする魔法使い。",
      strong:"プロンプト設計力が高い。AIの『当たり』を自分で作り出せる。",
      next:"『役割設定＋出力フォーマット＋禁止事項』の3点セットを型にすると精度がさらに跳ねる。",
      good:"otaku", bad:"partner" },
    creator:{ key:"creator", emoji:"🎨", title:"AIクリエイター", kicker:"CREATOR", rarity:4,
      color:"#ec4899", color2:"#f59e0b",
      stats:[65,60,95,65,70],
      catch:"AIで『作る』のが好き。手を動かす人。",
      strong:"アウトプット量が多い。アイデアを形にするスピードが速い。",
      next:"Claude CodeでLPや診断アプリを0円で公開してみて。この診断もそうやって作れる。",
      good:"partner", bad:"payer" },
    partner:{ key:"partner", emoji:"🤝", title:"相棒づかい", kicker:"PARTNER", rarity:4,
      color:"#34d399", color2:"#22d3ee",
      stats:[55,55,70,95,75],
      catch:"AIは話し相手。一緒に考えるタイプ。",
      strong:"会話で深掘りする力が高い。AIから良い答えを引き出す対話がうまい。",
      next:"Memoryに自分の口調や前提を10行貼ると、会話が一気に『自分専用』になる。",
      good:"creator", bad:"eff" },
    payer:{ key:"payer", emoji:"💸", title:"とりあえず課金", kicker:"THE PAYER", rarity:3,
      color:"#fb7185", color2:"#f59e0b",
      stats:[35,40,45,50,30],
      catch:"契約はしてる。あとは使うだけ…！",
      strong:"行動力（課金）はもうある。あとは習慣化するだけで伸びしろMAX。",
      next:"まず1つに絞って、毎日1回だけ使う。それだけで月3,000円の元は普通に取れる。",
      good:"eff", bad:"otaku" }
  };

  // ===== 状態 =====
  var idx=0, answers=[], el=function(id){return document.getElementById(id);};

  function show(sec){
    ["intro","quiz","result"].forEach(function(s){el(s).classList.add("hide");});
    el(sec).classList.remove("hide");
    el(sec).style.animation="none";void el(sec).offsetWidth;el(sec).style.animation="";
    window.scrollTo({top:0,behavior:"smooth"});
  }

  // ===== クイズ描画 =====
  function renderQuestion(){
    var Q=QUESTIONS[idx];
    el("qNum").textContent=idx+1;
    var pct=Math.round((idx/QUESTIONS.length)*100);
    el("qPct").textContent=pct+"%";el("barFill").style.width=pct+"%";
    el("qText").textContent=Q.q;
    el("backBtn").style.visibility=idx===0?"hidden":"visible";
    var box=el("opts");box.innerHTML="";
    var L=["A","B","C","D"];
    Q.a.forEach(function(opt,i){
      var b=document.createElement("button");
      b.className="opt"+(answers[idx]===i?" sel":"");
      b.innerHTML='<span class="k">'+L[i]+'</span><span>'+opt.t+'</span>';
      b.addEventListener("click",function(){
        answers[idx]=i;
        Array.prototype.forEach.call(box.children,function(c){c.classList.remove("sel");});
        b.classList.add("sel");setTimeout(next,230);
      });
      box.appendChild(b);
    });
  }
  function next(){ if(answers[idx]===undefined)return; if(idx<QUESTIONS.length-1){idx++;renderQuestion();}else finish(); }
  function back(){ if(idx>0){idx--;renderQuestion();} }

  function finish(){
    var score={otaku:0,eff:0,alch:0,creator:0,partner:0,payer:0};
    answers.forEach(function(ai,qi){score[QUESTIONS[qi].a[ai].k]++;});
    var priority=["otaku","alch","creator","partner","eff","payer"],best=priority[0],bv=-1;
    priority.forEach(function(k){if(score[k]>bv){bv=score[k];best=k;}});
    renderResult(best);
  }

  // ===== マスコットSVG =====
  function rarityStars(n){
    var s="";for(var i=0;i<5;i++){s+='<span class="'+(i<n?"on":"off")+'">★</span>';}return s;
  }
  function fxParticles(t){
    var pts=[[40,70],[212,92],[58,198],[196,196],[128,28],[228,150]];
    var s="";
    pts.forEach(function(p,i){ s+='<circle class="pt" cx="'+p[0]+'" cy="'+p[1]+'" r="'+(i%2?4:5.5)+'" fill="'+t.color+'"/>'; });
    return s;
  }
  function avatarHTML(t){
    var ch=(window.MASCOTS&&window.MASCOTS[t.key])?window.MASCOTS[t.key](t.color,t.color2):"";
    return ''+
      '<div class="aura" style="background:radial-gradient(circle at 50% 46%, '+hexA(t.color,.5)+', '+hexA(t.color,0)+' 62%)"></div>'+
      '<svg class="fx" viewBox="0 0 260 260">'+
        '<g class="orbit"><ellipse cx="130" cy="134" rx="120" ry="46" fill="none" stroke="'+t.color+'" stroke-opacity=".32" stroke-width="2"/></g>'+
        fxParticles(t)+
      '</svg>'+
      '<div class="char">'+ch+'</div>';
  }
  function miniMascot(t){ return (window.MASCOTS&&window.MASCOTS[t.key])?window.MASCOTS[t.key](t.color,t.color2):""; }

  // ===== ステータスバー =====
  function renderStats(t){
    var box=el("stats");box.innerHTML="";
    var maxIdx=0;for(var m=1;m<t.stats.length;m++){if(t.stats[m]>t.stats[maxIdx])maxIdx=m;}
    var rows=[];
    STAT_LABELS.forEach(function(name,i){
      var row=document.createElement("div");row.className="stat"+(i===maxIdx?" top":"");
      row.innerHTML='<span class="sn">'+name+'</span><div class="sbar"><i></i></div><span class="sv">'+t.stats[i]+'</span>';
      box.appendChild(row);rows.push(row.querySelector("i"));
    });
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      rows.forEach(function(bar,i){bar.style.width=t.stats[i]+"%";});
    });});
  }

  function renderResult(key){
    var T=TYPES[key];
    var R=el("result");
    R.style.setProperty("--tc",T.color);
    R.style.setProperty("--tc2",T.color2);
    el("avatar").innerHTML=avatarHTML(T);
    el("rRarity").innerHTML=rarityStars(T.rarity);
    el("rKicker").textContent="AI TYPE ／ "+T.kicker;
    el("rTitle").textContent=T.title+"タイプ";
    el("rCatch").textContent="「"+T.catch+"」";
    renderStats(T);
    el("rStrong").textContent=T.strong;
    el("rNext").textContent=T.next;
    var g=TYPES[T.good],b=TYPES[T.bad];
    el("rGoodEmoji").innerHTML=miniMascot(g);el("rGood").textContent=g.title+"タイプ";
    el("rBadEmoji").innerHTML=miniMascot(b);el("rBad").textContent=b.title+"タイプ";
    el("barFill").style.width="100%";
    el("copyBtn").dataset.key=key;
    el("copied").classList.remove("show");
    show("result");
  }

  // ===== シェアテキスト =====
  function buildShareText(key){
    var T=TYPES[key];
    return "私のAIタイプは "+T.emoji+T.title+"タイプ でした。\n「"+T.catch+"」\n\nあなたのAIタイプは？\n#あなたのAIタイプ診断";
  }
  function copyResult(){
    var key=el("copyBtn").dataset.key;if(!key)return;
    var text=buildShareText(key);
    var done=function(){el("copied").classList.add("show");setTimeout(function(){el("copied").classList.remove("show");},2600);};
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(text).then(done).catch(function(){legacyCopy(text);done();});}
    else{legacyCopy(text);done();}
  }
  function legacyCopy(text){
    var ta=document.createElement("textarea");ta.value=text;ta.style.position="fixed";ta.style.opacity="0";
    document.body.appendChild(ta);ta.focus();ta.select();try{document.execCommand("copy");}catch(e){}document.body.removeChild(ta);
  }

  // ===== 画像生成（Canvas・キャラシート 1080×1350） =====
  function hexA(hex,a){var n=parseInt(hex.slice(1),16);return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+a+")";}
  function rr(x,p,y,w,h,r){ if(x.roundRect){x.beginPath();x.roundRect(p,y,w,h,r);} else {x.beginPath();x.moveTo(p+r,y);x.arcTo(p+w,y,p+w,y+h,r);x.arcTo(p+w,y+h,p,y+h,r);x.arcTo(p,y+h,p,y,r);x.arcTo(p,y,p+w,y,r);x.closePath();} }
  function wrapText(ctx,text,maxW){var ch=text.split(""),lines=[],line="";for(var i=0;i<ch.length;i++){var test=line+ch[i];if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=ch[i];}else line=test;}if(line)lines.push(line);return lines;}

  function loadImg(src){return new Promise(function(res,rej){var im=new Image();im.onload=function(){res(im);};im.onerror=rej;im.src=src;});}

  function drawMascotFX(x,cx,cy,T){
    var au=x.createRadialGradient(cx,cy-10,20,cx,cy-10,225);
    au.addColorStop(0,hexA(T.color,.5));au.addColorStop(1,"rgba(0,0,0,0)");
    x.fillStyle=au;x.beginPath();x.arc(cx,cy-10,225,0,7);x.fill();
    x.strokeStyle=hexA(T.color,.32);x.lineWidth=3;
    x.beginPath();x.ellipse(cx,cy+14,188,72,0,0,7);x.stroke();
    var pts=[[-168,-72],[172,-48],[-122,124],[162,116],[6,-152],[198,64]];
    pts.forEach(function(p,i){x.fillStyle=hexA(T.color,i%2?.6:.9);x.beginPath();x.arc(cx+p[0],cy+p[1],i%2?6:8,0,7);x.fill();});
  }
  async function drawChar(x,cx,cy,size,T){
    try{
      var svg=(window.MASCOTS&&window.MASCOTS[T.key])?window.MASCOTS[T.key](T.color,T.color2):null;
      if(!svg)return;
      var img=await loadImg("data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg));
      x.drawImage(img, cx-size/2, cy-size/2, size, size);
    }catch(e){}
  }

  async function drawShareCard(key){
    var T=TYPES[key], W=1080, H=1350, cx=W/2;
    var c=document.createElement("canvas");c.width=W;c.height=H;var x=c.getContext("2d");

    // 背景
    var g=x.createLinearGradient(0,0,0,H);g.addColorStop(0,"#16121f");g.addColorStop(1,"#08060e");
    x.fillStyle=g;x.fillRect(0,0,W,H);
    var rg=x.createRadialGradient(cx,360,40,cx,360,760);
    rg.addColorStop(0,hexA(T.color,.3));rg.addColorStop(1,"rgba(0,0,0,0)");
    x.fillStyle=rg;x.fillRect(0,0,W,H);
    // 枠
    x.strokeStyle=hexA(T.color,.55);x.lineWidth=5;rr(x,34,34,W-68,H-68,34);x.stroke();
    // コーナーブラケット
    x.strokeStyle=hexA(T.color,.9);x.lineWidth=6;
    var br=[[70,70,1,1],[W-70,70,-1,1],[70,H-70,1,-1],[W-70,H-70,-1,-1]];
    br.forEach(function(b){x.beginPath();x.moveTo(b[0],b[1]+34*b[3]);x.lineTo(b[0],b[1]);x.lineTo(b[0]+34*b[2],b[1]);x.stroke();});

    x.textAlign="center";
    // キッカー
    x.fillStyle=hexA("#ffffff",.62);x.font="800 30px system-ui,sans-serif";
    x.fillText("AI TYPE DIAGNOSIS ／ "+T.kicker, cx, 130);
    // レア度
    x.font="40px system-ui,sans-serif";
    var stars="";for(var i=0;i<5;i++)stars+=(i<T.rarity?"★":"☆");
    x.fillStyle=hexA(T.color,1);x.fillText(stars, cx, 184);

    // マスコット（Codex作画SVGをラスタライズして合成）
    drawMascotFX(x, cx, 352, T);
    await drawChar(x, cx, 348, 392, T);

    // 名前
    x.textAlign="center";x.fillStyle="#ffffff";x.font="900 84px system-ui,sans-serif";
    x.fillText(T.title+"タイプ", cx, 600);
    // キャッチ
    x.fillStyle=hexA(T.color,1);x.font="700 40px system-ui,sans-serif";
    var cl=wrapText(x,"「"+T.catch+"」",W-220);var cy=662;cl.forEach(function(ln){x.fillText(ln,cx,cy);cy+=52;});

    // ステータス
    var sy=cy+38, step=84;
    var maxIdx=0;for(var mi=1;mi<T.stats.length;mi++){if(T.stats[mi]>T.stats[maxIdx])maxIdx=mi;}
    for(var s=0;s<5;s++){ drawStat(x, sy+s*step, STAT_LABELS[s], T.stats[s], T, s===maxIdx); }

    // フッター
    x.textAlign="center";
    x.fillStyle=hexA("#ffffff",.92);x.font="800 38px system-ui,sans-serif";
    x.fillText("#あなたのAIタイプ診断", cx, H-122);
    x.fillStyle=hexA("#ffffff",.4);x.font="500 28px system-ui,sans-serif";
    x.fillText("kon-ai01.github.io/ai-shindan", cx, H-74);

    return c;
  }

  function drawStat(x, y, name, val, T, top){
    var bx=300, bw=560;
    // 名前
    x.textAlign="left";x.fillStyle=top?"#ffffff":hexA("#ffffff",.66);x.font="700 34px system-ui,sans-serif";
    x.fillText(name, 130, y+10);
    if(top){ var nw=x.measureText(name).width; x.font="800 22px system-ui,sans-serif"; x.fillStyle=hexA(T.color,1); x.fillText("TOP", 130+nw+16, y+7); }
    // トラック
    x.fillStyle="rgba(255,255,255,.1)";rr(x,bx,y-14,bw,28,14);x.fill();
    // フィル
    var fg=x.createLinearGradient(bx,0,bx+bw,0);fg.addColorStop(0,T.color);fg.addColorStop(1,T.color2);
    x.fillStyle=fg;rr(x,bx,y-14,Math.max(28,bw*val/100),28,14);x.fill();
    // 値
    x.textAlign="right";x.fillStyle="#ffffff";x.font="800 36px system-ui,sans-serif";
    x.fillText(val, 1000, y+12);
  }

  async function saveImage(){
    var key=el("copyBtn").dataset.key;if(!key)return;
    var btn=el("saveImgBtn");var label=btn.textContent;btn.disabled=true;btn.textContent="画像を生成中…";
    try{
      var canvas=await drawShareCard(key);
      var dataURL=canvas.toDataURL("image/png");
      var a=document.createElement("a");a.href=dataURL;a.download="AIタイプ診断.png";
      document.body.appendChild(a);a.click();a.remove();
      el("modalImg").src=dataURL;el("imgModal").classList.add("open");
    }catch(e){}
    btn.disabled=false;btn.textContent=label;
  }
  function closeModal(){el("imgModal").classList.remove("open");}

  function start(){idx=0;answers=[];renderQuestion();show("quiz");}

  // ===== イベント =====
  el("startBtn").addEventListener("click",start);
  el("retryBtn").addEventListener("click",function(){start();});
  el("backBtn").addEventListener("click",back);
  el("copyBtn").addEventListener("click",copyResult);
  el("saveImgBtn").addEventListener("click",saveImage);
  el("modalClose").addEventListener("click",closeModal);
  el("imgModal").addEventListener("click",function(e){if(e.target===el("imgModal"))closeModal();});

})();
</script>
</body>
</html>
